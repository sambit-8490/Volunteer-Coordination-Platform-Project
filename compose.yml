version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./Server
    container_name: server
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./Server/.env
    depends_on:
      - mongo

  client:
    build: ./volunteer-platform
    container_name: client
    restart: always
    ports:
      - "5173:5173"
    env_file:
      - ./volunteer-platform/.env
    depends_on:
      - server

volumes:
  mongo-data:
